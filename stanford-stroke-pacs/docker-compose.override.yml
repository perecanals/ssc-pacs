# docker-compose.override.yml — macOS / Colima only. Auto-merged over docker-compose.yml.
# Keep this file OFF the Linux host (it is .gitignored). It adapts the Linux base
# (which uses network_mode: host) to Colima:
#   * drop host networking and publish ports explicitly (Colima forwards them to
#     the Mac's localhost)
#   * the Orthanc container reaches host Postgres via host.docker.internal
#     (Colima NATs this to the host loopback, so the host's 127.0.0.1 trust rule
#     accepts it — no pg_hba change)
#   * bind-mount the cold-cache extraction root (legacy_dicom_root) as /dicom-data
services:
  orthanc:
    network_mode: !reset null        # drop the base file's `network_mode: host`
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC__POSTGRESQL__HOST: "host.docker.internal"
    volumes:
      - /Volumes/ThunderBay_RAID1/ssc-pacs-data/imaging_data:/dicom-data:ro
