services:
  orthanc:
    # Custom image with a patched Folder Indexer plugin (RemoveMissingFiles flag +
    # scoped /indexer/scan). Build it first from ../orthanc-indexer-patched (see its README).
    image: ssc-orthanc:patched-indexer
    container_name: ssc-orthanc
    # NETWORKING — this file targets LINUX: host networking lets the container
    # reach host Postgres at localhost and publishes 8042/4242 directly on the host.
    # On macOS host networking does NOT bridge to the Mac, so DO NOT edit this file —
    # scripts/orthanc/dc.sh adds docker-compose.override.macos.yml (drops
    # network_mode, publishes ports, points Postgres at host.docker.internal).
    # See docs/guides/deployment_on_mac.md §4.
    network_mode: host
    restart: unless-stopped
    env_file: .env
    environment:
      ORTHANC__POSTGRESQL__ENABLE_INDEX: "true"
      ORTHANC__POSTGRESQL__ENABLE_STORAGE: "false"
      ORTHANC__POSTGRESQL__HOST: "${DB_HOST}"
      ORTHANC__POSTGRESQL__PORT: "${DB_PORT}"
      ORTHANC__POSTGRESQL__DATABASE: "${PG_ORTHANC_DB}"
      ORTHANC__POSTGRESQL__USERNAME: "${PG_ORTHANC_USER}"
      ORTHANC__POSTGRESQL__PASSWORD: "${PG_ORTHANC_PASSWORD}"
      ORTHANC__POSTGRESQL__LOCK: "false"
      # Cap the index plugin's connection pool. The plugin default opens ~50
      # connections (half of Postgres max_connections=100) and keeps them open
      # for the life of the container — far more than this single-instance PACS
      # needs. 8 is ample for the indexer + UI/OHIF query load.
      ORTHANC__POSTGRESQL__INDEX_CONNECTIONS_COUNT: "8"
      # Ports: orthanc.json carries the in-image defaults; these env overrides let
      # .env be the single place to change them (default 8042/4242 if unset).
      ORTHANC__HTTP_PORT: "${ORTHANC_HTTP_PORT:-8042}"
      ORTHANC__DICOM_PORT: "${ORTHANC_DICOM_PORT:-4242}"
    volumes:
      # Host DICOM tree → /dicom-data (read-only). The source path is NOT hardcoded
      # here: it comes from config.toml ([storage].mode + the matching path) via
      # scripts/orthanc/dc.sh, which exports DICOM_MOUNT_SOURCE. Always bring the
      # stack up through that wrapper — bare `docker compose up` will error that
      # DICOM_MOUNT_SOURCE is unset. See docs/reference/configuration_sources.md.
      - ${DICOM_MOUNT_SOURCE:?set by scripts/orthanc/dc.sh — run the stack via that wrapper}:/dicom-data:ro
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./orthanc_users.json:/etc/orthanc/orthanc_users.json:ro
      - ssc-orthanc-storage:/var/lib/orthanc/db

volumes:
  ssc-orthanc-storage:
