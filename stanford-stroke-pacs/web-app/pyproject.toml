# pyproject.toml — tool config for the web-app backend.
# Lives at web-app/ because it is the only non-trivial Python component.

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — enforced by line-length, not per-line
    "E402",  # module level import not at top — required for path bootstrap in app.py
    "B008",  # do not perform function calls in argument defaults (FastAPI Depends)
    "B904",  # raise from — HTTPException is a control-flow response, not error chaining
]

[tool.ruff.lint.isort]
known-first-party = ["config", "cache_manager", "labelled_table_sync", "logging_config", "metrics"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_configs = true
warn_return_any = true
disallow_untyped_defs = false
