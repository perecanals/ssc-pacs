# Alembic configuration for the `stanford-stroke` PostgreSQL database.
# Database URL is supplied at runtime by alembic/env.py (from .env / config.py)
# — do NOT put credentials here.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is intentionally left blank; env.py builds it from the
# same DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD env vars that
# companion/app.py uses.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
