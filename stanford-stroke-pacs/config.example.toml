# Copy to `config.toml` and set the installation-specific values for this host.
#
# `config.toml` is the single source of truth for non-secret operational
# settings and is gitignored (per-host, like `.env`). Keys marked REQUIRED have
# no built-in default — the web app refuses to start until they are set.
# Benign tuning knobs ship with safe defaults and may be left as-is.
# Secrets stay in `.env` (DB_PASSWORD, JWT_SECRET, Orthanc admin password, etc.).
# See docs/reference/configuration_sources.md.

[storage]
# REQUIRED — "legacy" | "cold_path_cache".
#   legacy:          Orthanc's Folder Indexer reads loose DICOMs from dicom_data_root.
#   cold_path_cache: canonical series are *.tar.zst under cold_archive_root; warm
#                    extracts back to dicom_data_root (needs the patched Orthanc image).
mode = "legacy"
# REQUIRED — uncompressed DICOM tree Orthanc indexes. In cold_path_cache mode this
# doubles as the warm cache: archives are extracted back here on warm (the path each
# series records in image_series.dicom_dir_path lives under this root).
dicom_data_root = "/path/to/imaging_data"
# REQUIRED — root of the *.tar.zst cold archives (cold_path_cache mode; still
# required in legacy mode, where it only names the future archive location).
cold_archive_root = "/path/to/imaging_data_compressed"
# Cold-cache tuning (benign defaults).
eviction_ttl_hours = 168
# Cold-storage warm watchdog: a `cache_state` row stuck in status='warming'
# longer than this is treated as cold by the next warm attempt (recovers
# from a process crash between archive extraction and the final hot mark).
warming_timeout_minutes = 30
# Pre-extraction disk-space guard. Required free bytes on the target
# filesystem are estimated as `safety_factor * compressed_archive_size`
# plus `min_free_bytes` of headroom. .zst typically expands ~3× for DICOM.
warming_disk_safety_factor = 3.0
warming_disk_min_free_bytes = 1048576000  # 1000 MiB
# How many STUDIES warm (decompress) concurrently (POST /warm returns 202;
# extraction runs in the background). Warming is disk-bandwidth bound, not CPU
# bound (measured) — more workers just split the fixed disk throughput, making
# each study slower. Keep LOW; the real speed lever is reducing competing disk
# I/O, not this number.
warm_workers = 6

[backup]
# Single source of truth for the backup scripts (scripts/backup/*). Each script
# still honours an explicit env override (BACKUP_ROOT / RETENTION_DAYS /
# MAX_AGE_HOURS) for one-off runs; these values are the deployment default.
# REQUIRED (by the backup scripts) — root directory for all backups. Each target
# (orthanc_db, stanford-stroke, orthanc_storage) gets its own subdirectory here.
backup_root = "/path/to/backups"
# Days to keep dated dumps/archives before pruning (always keeps >= 1).
retention_days = 60
# Freshness-monitor alert threshold: a backup older than this many hours is
# reported stale by check_backup_freshness.sh.
max_age_hours = 36

[web-app]
# HTTP port uvicorn serves on. Consumed at unit-install time: the systemd and
# launchd installers render it into the service templates (override per host
# with WEBAPP_PORT in deploy.env). Changing it requires re-running the unit
# installer, and remember to adjust SSH-tunnel forwards to match.
port = 8043
# Sliding idle timeout. Cookie is refreshed on every authenticated request; if
# no request is made for this many hours the session is dead. The SPA proactively
# redirects to /login with an "expired" banner once idle this long (its watchdog
# reads this value via /api/me) — it no longer waits for the next request to 401.
session_timeout_hours = 2
# Absolute (non-sliding) session lifetime. A token minted more than this many
# hours ago is rejected regardless of sliding refresh activity.
session_absolute_timeout_hours = 24
# Emit the JWT cookie with Secure=true so browsers only send it over HTTPS.
# Disable when all access is via SSH tunnel (browser↔web-app is loopback,
# wire is SSH-encrypted); Safari refuses Secure cookies on http://localhost.
cookie_secure = true
# Per-IP cap for POST /api/login attempts inside a 5-minute rolling window.
login_rate_limit_per_5min = 10
# Which clinical_data column supplies the patient tab's "Episode Date"
# (COALESCEd over the imaging-derived patient.stroke_date). Must be a bare SQL
# identifier — the web-app refuses to start otherwise — and should exist on
# clinical_data when the table is present (falls back to stroke_date with a
# startup WARN if not). Irrelevant when the optional clinical table is absent.
clinical_episode_date_column = "stroke_date"
