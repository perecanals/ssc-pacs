# Non-secret operational settings (version-controllable).
# Secrets stay in `.env` (DB_PASSWORD, JWT_SECRET, Orthanc admin password, etc.).

[storage]
# "legacy" | "cold_path_cache"
mode = "cold_path_cache"
legacy_dicom_root = "/Volumes/ThunderBay_RAID1/ssc-pacs-data/imaging_data"
cold_archive_root = "/Volumes/ThunderBay_RAID1/ssc-pacs-data/compressed"
hot_cache_dir = "/Volumes/ThunderBay_RAID1/ssc-pacs-data/hot_cache"
eviction_ttl_hours = 336
# Cold-storage warm watchdog: a `cache_state` row stuck in status='warming'
# longer than this is treated as cold by the next warm attempt (recovers
# from a process crash between archive extraction and the final hot mark).
warming_timeout_minutes = 30
# Pre-extraction disk-space guard. Required free bytes on the target
# filesystem are estimated as `safety_factor * compressed_archive_size`
# plus `min_free_bytes` of headroom. .zst typically expands ~3× for DICOM.
warming_disk_safety_factor = 3.0
warming_disk_min_free_bytes = 104857600  # 100 MiB
# How many STUDIES warm (decompress) concurrently. POST /api/studies/{uid}/warm
# returns 202; extraction runs in the background. Decompression is
# disk-BANDWIDTH bound, not CPU bound (measured: the warm process sits at a few
# % CPU, waiting on small-file writes to the shared ThunderBay volume). So more
# workers does NOT speed things up — N concurrent extractions just split the
# fixed disk throughput N ways, making each study slower. Keep this LOW: fewer
# in-flight warms means each gets more of the pipe and the case a rater just
# clicked is ready sooner. The real lever for speed is reducing competing disk
# I/O (CrashPlan/Spotlight/other users), not this number.
warm_workers = 2

[backup]
# Single source of truth for the backup scripts (scripts/backup/*). Each script
# still honours an explicit env override (BACKUP_ROOT / RETENTION_DAYS /
# MAX_AGE_HOURS) for one-off runs; these values are the deployment default.
# Root directory for all backups. Each target (orthanc_db, stanford-stroke,
# orthanc_storage) gets its own subdirectory here.
backup_root = "/Volumes/ThunderBay_RAID1/ssc-pacs-backups"
# Days to keep dated dumps/archives before pruning (always keeps >= 1).
retention_days = 60
# Freshness-monitor alert threshold: a backup older than this many hours is
# reported stale by check_backup_freshness.sh.
max_age_hours = 36

[web-app]
# Sliding idle timeout. Cookie is refreshed on every authenticated request; if
# no request is made for this many hours the session is dead. The SPA proactively
# redirects to /login with an "expired" banner once idle this long (its watchdog
# reads this value via /api/me) — it no longer waits for the next request to 401.
# 0.0833 ≈ 5 minutes.
session_timeout_hours = 0.0833
# Absolute (non-sliding) session lifetime. A token minted more than this many
# hours ago is rejected regardless of sliding refresh activity.
session_absolute_timeout_hours = 24
# Emit the JWT cookie with Secure=true so browsers only send it over HTTPS.
# Disabled because all access is via SSH tunnel (browser↔web-app is loopback,
# wire is SSH-encrypted) and Safari refuses Secure cookies on http://localhost.
cookie_secure = false
# Per-IP cap for POST /api/login attempts inside a 5-minute rolling window.
login_rate_limit_per_5min = 10
