name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      # requirements-dev.txt pins ruff — an unpinned `pip install ruff` let a
      # ruff release break CI without any repo change.
      - run: pip install -r stanford-stroke-pacs/web-app/requirements-dev.txt
      # ruff's first-party import detection is cwd-sensitive: lint web-app and
      # the ingestion package from their own directories (matches Makefile and
      # the pre-commit hook). web-app/pyproject.toml is the single ruleset.
      - name: Run ruff on web-app
        working-directory: stanford-stroke-pacs/web-app
        run: ruff check .
      - name: Run ruff on scripts
        run: ruff check stanford-stroke-pacs/scripts --config stanford-stroke-pacs/web-app/pyproject.toml
      - name: Run ruff on image_ingestion_protocols
        working-directory: stanford-stroke-pacs/image_ingestion_protocols
        run: ruff check . --config ../web-app/pyproject.toml

  backend-tests:
    name: Backend tests (pytest, pg${{ matrix.postgres }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Supported PostgreSQL range is a floor, not a pin: 16 is the declared
        # minimum, 18 is what production runs (see
        # docs/operations/postgres_provisioning.md). Test both ends.
        postgres: ["16", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: ci_user
      DB_PASSWORD: ci_pass
      # This database is never created in CI (the service only has "postgres");
      # tests/conftest.py overrides DB_NAME with its own scratch DB. Kept so any
      # accidental pre-fixture connection fails loudly instead of hitting a
      # real-looking database.
      DB_NAME: stanford-stroke
      JWT_SECRET: ci-test-jwt-secret-32bytes!!!!
      ORTHANC_ADMIN_USER: ci_orthanc
      ORTHANC_ADMIN_PASSWORD: ci_orthanc_pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: stanford-stroke-pacs/web-app
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest with coverage
        working-directory: stanford-stroke-pacs/web-app
        run: |
          python -m pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --tb=short \
            -v

  ingestion-tests:
    name: Ingestion tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        # The ingestion executor imports web-app modules (config,
        # labelled_table_sync → common → fastapi), so the web-app runtime deps
        # are required alongside the stack deps (pandas, pydicom, …) and the
        # dev pins (pytest).
        run: |
          pip install -r stanford-stroke-pacs/requirements.txt \
                      -r stanford-stroke-pacs/web-app/requirements.txt \
                      -r stanford-stroke-pacs/web-app/requirements-dev.txt
      - name: Run pytest
        # DB-free: the scratch-Postgres e2e is gated on SSC_INGEST_AUDIT=1 and
        # auto-skips here.
        working-directory: stanford-stroke-pacs/image_ingestion_protocols
        run: python -m pytest tests/ --tb=short -v

  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: stanford-stroke-pacs/web-app
        run: npm ci
      - name: Run eslint
        working-directory: stanford-stroke-pacs/web-app
        run: npm run lint
      - name: Run vitest
        working-directory: stanford-stroke-pacs/web-app
        run: npx vitest run

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install and build
        working-directory: stanford-stroke-pacs/web-app
        run: |
          npm ci
          npm run build

  mypy:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: stanford-stroke-pacs/web-app
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run mypy
        working-directory: stanford-stroke-pacs/web-app
        run: |
          python -m mypy . \
            --config-file pyproject.toml \
            --ignore-missing-imports \
            --no-error-summary \
            || true
